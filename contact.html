<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Contact GWP MEDIA through our direct message form.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://www.example.com/contact.html">
  <meta property="og:type" content="website">
  <meta property="og:title" content="GWP MEDIA | Contact">
  <meta property="og:description" content="Send a message to GWP MEDIA.">
  <meta property="og:url" content="https://www.example.com/contact.html">
  <title>GWP MEDIA | Contact</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="./GWP-MEDIA.png">
  <link rel="manifest" href="./site.webmanifest">
  <meta name="theme-color" content="#184b44">
  <meta property="og:image" content="https://www.example.com/GWP-MEDIA.png">
  <meta name="twitter:image" content="https://www.example.com/GWP-MEDIA.png">
  <script src="script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <nav class="navbar" aria-label="Main navigation">
      <a href="./index.html" class="brand" aria-label="Go to home">
        <img src="GWP-MEDIA.png" alt="GWP MEDIA logo" class="site-logo" width="42" height="42" decoding="async">
        <span class="logo-text">GWP-MEDIA</span>
      </a>
      <ul class="nav-links">
        <li><a href="./index.html">Home</a></li>
        <li><a href="./about.html">About</a></li>
        <li><a href="./blogs.html">Blogs</a></li>
        <li><a href="./projects.html">Projects</a></li>
        <li><a href="./focus.html">Focus</a></li>
        <li><a href="./telegram.html">Telegram</a></li>
        <li><a href="./contact.html" class="active" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="section contact-section">
      <div class="section-head">
        <p class="section-tag">Work Together</p>
        <h2>Get in Touch</h2>
      </div>

      <div class="contact-card">
        <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
          <input type="hidden" name="access_key" value="13729cdc-12b6-450c-bf5d-e21b92717df8">
          <input type="text" name="name" placeholder="Your name" required>
          <input type="email" name="email" placeholder="Your email address" required>
          <textarea name="message" placeholder="Write your message here" required></textarea>
          <button type="submit" class="btn form-btn">Send Message</button>
        </form>
      </div>
    </section>
  </main>
  <section class="site-cta reveal" aria-labelledby="cta-title">
    <div class="site-cta-inner">
      <p class="section-tag">Stay Connected</p>
      <h2 id="cta-title">Join the GWP MEDIA community</h2>
      <p>Get new reflections and project updates on Telegram.</p>
      <div class="site-cta-actions">
        <a href="https://t.me/Gosp22" target="_blank" rel="noopener noreferrer" class="btn">Join Telegram</a>
        <a href="./contact.html" class="btn btn-outline">Contact</a>
      </div>
    </div>
  </section>
  <footer>
    <p>&copy; 2026 Robera. All rights reserved.</p>
  </footer>
</body>
</html>
